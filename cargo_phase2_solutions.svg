<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="50%" stop-color="#162138"/>
      <stop offset="100%" stop-color="#14283a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a032"/>
      <stop offset="100%" stop-color="#e8b84a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="600" rx="32" fill="url(#bg)"/>
  <!-- Gold top bar -->
  <rect x="30" y="0" width="540" height="6" rx="0" fill="url(#gold)"/>
  <!-- Lightbulb icon -->
  <g transform="translate(300,210)" filter="url(#shadow)">
    <!-- Bulb body -->
    <ellipse cx="0" cy="-30" rx="52" ry="58" fill="none" stroke="#d4a032" stroke-width="4" opacity="0.8"/>
    <!-- Inner glow -->
    <ellipse cx="0" cy="-30" rx="36" ry="40" fill="#d4a032" opacity="0.15"/>
    <!-- Filament -->
    <path d="M-12,0 L-12,20 Q-12,32 0,32 Q12,32 12,20 L12,0" fill="none" stroke="#d4a032" stroke-width="3.5" opacity="0.7"/>
    <!-- Base lines -->
    <line x1="-16" y1="8" x2="16" y2="8" stroke="#8896aa" stroke-width="3" stroke-linecap="round"/>
    <line x1="-14" y1="16" x2="14" y2="16" stroke="#8896aa" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="24" x2="10" y2="24" stroke="#8896aa" stroke-width="3" stroke-linecap="round"/>
    <!-- Rays -->
    <line x1="0" y1="-100" x2="0" y2="-115" stroke="#d4a032" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="50" y1="-85" x2="62" y2="-96" stroke="#d4a032" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="-50" y1="-85" x2="-62" y2="-96" stroke="#d4a032" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="68" y1="-40" x2="82" y2="-40" stroke="#d4a032" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <line x1="-68" y1="-40" x2="-82" y2="-40" stroke="#d4a032" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <!-- Small box overlay -->
    <g transform="translate(42,-10)">
      <rect x="0" y="0" width="36" height="32" rx="4" fill="none" stroke="#8896aa" stroke-width="2.5" opacity="0.6"/>
      <line x1="0" y1="10" x2="36" y2="10" stroke="#8896aa" stroke-width="2" opacity="0.4"/>
      <text x="18" y="26" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#8896aa" opacity="0.6">📋</text>
    </g>
  </g>
  <!-- Text -->
  <text x="300" y="370" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="62" font-weight="900" letter-spacing="4" fill="#d4a032">CARGO CLAIMS</text>
  <text x="300" y="438" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="58" font-weight="800" letter-spacing="3" fill="#e8eef1">PH II · SOLUTIONS</text>
  <text x="300" y="500" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="400" letter-spacing="6" fill="#8896aa">COMING SOON</text>
</svg>
