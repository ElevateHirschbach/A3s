<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="40%" stop-color="#162138"/>
      <stop offset="80%" stop-color="#14283a"/>
      <stop offset="100%" stop-color="#1a3030"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a032"/>
      <stop offset="100%" stop-color="#e8b84a"/>
    </linearGradient>
    <linearGradient id="corner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a032"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="600" height="600" rx="36" fill="url(#bg)"/>
  <rect x="32" y="0" width="536" height="6" fill="url(#gold)" rx="0"/>
  <rect x="0" y="0" width="6" height="200" fill="url(#corner)" rx="0"/>
  <!-- Truck icon -->
  <g transform="translate(300,200)" filter="url(#shadow)">
    <!-- Trailer body -->
    <rect x="-15" y="-55" width="80" height="55" rx="4" fill="none" stroke="#8896aa" stroke-width="3" opacity="0.6"/>
    <!-- Trailer lines -->
    <line x1="5" y1="-55" x2="5" y2="0" stroke="#8896aa" stroke-width="1.5" opacity="0.3"/>
    <line x1="25" y1="-55" x2="25" y2="0" stroke="#8896aa" stroke-width="1.5" opacity="0.3"/>
    <line x1="45" y1="-55" x2="45" y2="0" stroke="#8896aa" stroke-width="1.5" opacity="0.3"/>
    <!-- Green stripe on trailer -->
    <line x1="-15" y1="-30" x2="65" y2="-30" stroke="#4a7c43" stroke-width="2.5" opacity="0.5"/>
    <!-- Cab -->
    <path d="M-15,-55 L-45,-55 L-55,-30 L-55,0 L-15,0 Z" fill="none" stroke="#8896aa" stroke-width="3" opacity="0.6"/>
    <!-- Window -->
    <rect x="-48" y="-48" width="22" height="16" rx="3" fill="#4a6a8a" opacity="0.35"/>
    <!-- Wheels -->
    <circle cx="-35" cy="8" r="9" fill="none" stroke="#8896aa" stroke-width="2.5" opacity="0.5"/>
    <circle cx="-35" cy="8" r="3" fill="#8896aa" opacity="0.3"/>
    <circle cx="20" cy="8" r="9" fill="none" stroke="#8896aa" stroke-width="2.5" opacity="0.5"/>
    <circle cx="20" cy="8" r="3" fill="#8896aa" opacity="0.3"/>
    <circle cx="40" cy="8" r="9" fill="none" stroke="#8896aa" stroke-width="2.5" opacity="0.5"/>
    <circle cx="40" cy="8" r="3" fill="#8896aa" opacity="0.3"/>
    <!-- Cab color accent -->
    <path d="M-15,-55 L-45,-55 L-55,-30 L-55,0 L-15,0 Z" fill="#c0392b" opacity="0.15"/>
  </g>
  <!-- Text -->
  <text x="300" y="370" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="68" font-weight="900" letter-spacing="4" fill="#d4a032">DRIVER</text>
  <text x="300" y="445" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="68" font-weight="800" letter-spacing="3" fill="#e8eef1">RETENTION</text>
  <text x="300" y="505" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="26" font-weight="400" letter-spacing="6" fill="#8896aa">HAYDEN STOCKING</text>
</svg>
