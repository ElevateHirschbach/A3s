<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="50%" stop-color="#162138"/>
      <stop offset="100%" stop-color="#14283a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a032"/>
      <stop offset="100%" stop-color="#e8b84a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="600" rx="32" fill="url(#bg)"/>
  <!-- Gold top bar -->
  <rect x="30" y="0" width="540" height="6" rx="0" fill="url(#gold)"/>
  <!-- Road / Highway icon -->
  <g transform="translate(300,195)" filter="url(#shadow)">
    <!-- Road perspective -->
    <path d="M-80,60 L-30,-60 L30,-60 L80,60 Z" fill="#3a4558" stroke="#5a6578" stroke-width="2" opacity="0.7"/>
    <!-- Road lines (dashed center) -->
    <line x1="0" y1="-50" x2="0" y2="-30" stroke="#d4a032" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="-18" x2="0" y2="2" stroke="#d4a032" stroke-width="4.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="14" x2="0" y2="38" stroke="#d4a032" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="46" x2="0" y2="58" stroke="#d4a032" stroke-width="5.5" stroke-linecap="round" opacity="0.9"/>
    <!-- Truck silhouette on road -->
    <g transform="translate(0, -15) scale(0.8)">
      <!-- Trailer -->
      <rect x="-10" y="-35" width="55" height="35" rx="3" fill="none" stroke="#8896aa" stroke-width="2.5" opacity="0.6"/>
      <!-- Cab -->
      <path d="M-10,-35 L-30,-35 L-35,-18 L-35,-2 L-10,-2 Z" fill="none" stroke="#8896aa" stroke-width="2.5" opacity="0.6"/>
      <!-- Wheels -->
      <circle cx="-22" cy="2" r="6" fill="none" stroke="#8896aa" stroke-width="2" opacity="0.5"/>
      <circle cx="30" cy="2" r="6" fill="none" stroke="#8896aa" stroke-width="2" opacity="0.5"/>
      <!-- Window -->
      <rect x="-28" y="-30" width="14" height="12" rx="2" fill="#4a6a8a" opacity="0.4"/>
    </g>
  </g>
  <!-- Text -->
  <text x="300" y="370" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="62" font-weight="900" letter-spacing="4" fill="#d4a032">CARGO CLAIMS</text>
  <text x="300" y="438" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="50" font-weight="800" letter-spacing="2" fill="#e8eef1">OTR / DEDICATED</text>
  <text x="300" y="500" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="400" letter-spacing="6" fill="#8896aa">COMING SOON</text>
</svg>
