<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="40%" stop-color="#162138"/>
      <stop offset="80%" stop-color="#14283a"/>
      <stop offset="100%" stop-color="#1a3030"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a032"/>
      <stop offset="100%" stop-color="#e8b84a"/>
    </linearGradient>
    <linearGradient id="corner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a032"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="600" height="600" rx="36" fill="url(#bg)"/>
  <rect x="32" y="0" width="536" height="6" fill="url(#gold)" rx="0"/>
  <rect x="0" y="0" width="6" height="200" fill="url(#corner)" rx="0"/>
  <!-- Trailer icon -->
  <g transform="translate(300,195)" filter="url(#shadow)">
    <!-- Trailer body -->
    <rect x="-70" y="-50" width="140" height="75" rx="5" fill="none" stroke="#8896aa" stroke-width="3" opacity="0.55"/>
    <!-- Vertical ribs -->
    <line x1="-50" y1="-50" x2="-50" y2="25" stroke="#8896aa" stroke-width="1.5" opacity="0.25"/>
    <line x1="-30" y1="-50" x2="-30" y2="25" stroke="#8896aa" stroke-width="1.5" opacity="0.25"/>
    <line x1="-10" y1="-50" x2="-10" y2="25" stroke="#8896aa" stroke-width="1.5" opacity="0.25"/>
    <line x1="10" y1="-50" x2="10" y2="25" stroke="#8896aa" stroke-width="1.5" opacity="0.25"/>
    <line x1="30" y1="-50" x2="30" y2="25" stroke="#8896aa" stroke-width="1.5" opacity="0.25"/>
    <line x1="50" y1="-50" x2="50" y2="25" stroke="#8896aa" stroke-width="1.5" opacity="0.25"/>
    <!-- DOT plate -->
    <rect x="20" y="-30" width="38" height="20" rx="3" fill="none" stroke="#d4a032" stroke-width="1.5" opacity="0.5"/>
    <text x="39" y="-16" text-anchor="middle" font-family="Arial" font-size="11" font-weight="700" fill="#d4a032" opacity="0.5">DOT</text>
    <!-- Hitch -->
    <circle cx="-78" cy="5" r="7" fill="none" stroke="#8896aa" stroke-width="2.5" opacity="0.45"/>
    <circle cx="-78" cy="5" r="2.5" fill="#8896aa" opacity="0.3"/>
    <!-- Wheels -->
    <circle cx="20" cy="38" r="12" fill="none" stroke="#8896aa" stroke-width="2.5" opacity="0.5"/>
    <circle cx="20" cy="38" r="5" fill="none" stroke="#8896aa" stroke-width="1.5" opacity="0.35"/>
    <circle cx="20" cy="38" r="2" fill="#8896aa" opacity="0.3"/>
    <circle cx="50" cy="38" r="12" fill="none" stroke="#8896aa" stroke-width="2.5" opacity="0.5"/>
    <circle cx="50" cy="38" r="5" fill="none" stroke="#8896aa" stroke-width="1.5" opacity="0.35"/>
    <circle cx="50" cy="38" r="2" fill="#8896aa" opacity="0.3"/>
  </g>
  <!-- Text -->
  <text x="300" y="375" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="62" font-weight="900" letter-spacing="4" fill="#d4a032">TRAILER</text>
  <text x="300" y="448" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="52" font-weight="800" letter-spacing="2" fill="#e8eef1">MANAGEMENT</text>
  <text x="300" y="505" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="26" font-weight="400" letter-spacing="6" fill="#8896aa">CHRISTINA WOOD</text>
</svg>
