<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="50%" stop-color="#162138"/>
      <stop offset="100%" stop-color="#14283a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a032"/>
      <stop offset="100%" stop-color="#e8b84a"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="600" rx="32" fill="url(#bg)"/>
  <!-- Gold top bar -->
  <rect x="30" y="0" width="540" height="6" rx="0" fill="url(#gold)"/>
  <!-- Speedometer / Clock icon -->
  <g transform="translate(300,200)" filter="url(#shadow)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#8896aa" stroke-width="3" opacity="0.5"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#5a6578" stroke-width="1.5" opacity="0.4"/>
    <!-- Tick marks -->
    <line x1="0" y1="-56" x2="0" y2="-48" stroke="#8896aa" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="48" y1="-28" x2="42" y2="-24" stroke="#8896aa" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="48" y1="28" x2="42" y2="24" stroke="#8896aa" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="56" x2="0" y2="48" stroke="#8896aa" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="-48" y1="28" x2="-42" y2="24" stroke="#8896aa" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="-48" y1="-28" x2="-42" y2="-24" stroke="#8896aa" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <!-- Needle pointing to fast/high -->
    <line x1="0" y1="0" x2="36" y2="-36" stroke="#d4a032" stroke-width="4" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="6" fill="#d4a032" opacity="0.9"/>
    <!-- Speed lines -->
    <line x1="80" y1="-10" x2="105" y2="-10" stroke="#d4a032" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="82" y1="4" x2="100" y2="4" stroke="#d4a032" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="85" y1="18" x2="96" y2="18" stroke="#d4a032" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
    <!-- Lightning bolt accent -->
    <g transform="translate(-85, -20) scale(0.7)">
      <path d="M10,-35 L-5,0 L8,0 L-5,35 L15,5 L2,5 Z" fill="#d4a032" opacity="0.5"/>
    </g>
  </g>
  <!-- Text -->
  <text x="300" y="390" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="72" font-weight="900" letter-spacing="5" fill="#d4a032">EXPEDITED</text>
  <text x="300" y="448" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="42" font-weight="400" letter-spacing="6" fill="#8896aa">COMING SOON</text>
</svg>
